services:
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: container_monitoring
      POSTGRES_USER: container_monitoring
      POSTGRES_PASSWORD: container_monitoring
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./core/migrations/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U container_monitoring -d container_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 12

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./core/migrations/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./core/deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./core/deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      clickhouse:
        condition: service_healthy

  core:
    image: golang:1.25-alpine
    working_dir: /workspace/core
    command: go run ./cmd/core
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: :8080
      KAFKA_BROKERS: kafka:29092
      KAFKA_METRICS_TOPIC: container.metrics
      KAFKA_EVENTS_TOPIC: container.events
      KAFKA_GROUP_ID: container-monitoring-core-local
      POSTGRES_DSN: postgres://container_monitoring:container_monitoring@postgres:5432/container_monitoring?sslmode=disable
      CLICKHOUSE_DSN: http://clickhouse:8123
      REDIS_ADDR: redis:6379
      RECOVERY_DOCKER_HOST: unix:///var/run/docker.sock
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      GOCACHE: /tmp/go-cache
      GOMODCACHE: /go/pkg/mod
    volumes:
      - ./core:/workspace/core
      - /var/run/docker.sock:/var/run/docker.sock
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/tmp/go-cache
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent:
    image: golang:1.24-alpine
    working_dir: /workspace/agent
    command: go run ./cmd/agent
    environment:
      AGENT_NODE_ID: local-node
      AGENT_COLLECTOR_BACKEND: docker
      DOCKER_HOST: unix:///var/run/docker.sock
      COLLECT_INTERVAL: 5s
      KAFKA_BROKERS: kafka:29092
      KAFKA_METRICS_TOPIC: container.metrics
      KAFKA_EVENTS_TOPIC: container.events
      GOCACHE: /tmp/go-cache
      GOMODCACHE: /go/pkg/mod
    volumes:
      - ./agent:/workspace/agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/tmp/go-cache
    depends_on:
      kafka:
        condition: service_healthy
      target-nginx:
        condition: service_started

  target-nginx:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    labels:
      container-monitoring.target: "true"

volumes:
  postgres-data:
  clickhouse-data:
  grafana-data:
  go-mod-cache:
  go-build-cache:
