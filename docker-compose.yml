x-goose-image: &goose-image ghcr.io/kukymbr/goose-docker:3.27.1

services:
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: container_monitoring
      POSTGRES_USER: container_monitoring
      POSTGRES_PASSWORD: container_monitoring
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U container_monitoring -d container_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate-postgres:
    image: *goose-image
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: host=postgres port=5432 user=container_monitoring password=container_monitoring dbname=container_monitoring sslmode=disable
    volumes:
      - ./core/migrations/postgres:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: container_monitoring
      CLICKHOUSE_PASSWORD: container_monitoring
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user container_monitoring --password container_monitoring --query 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate-clickhouse:
    image: *goose-image
    environment:
      GOOSE_DRIVER: clickhouse
      GOOSE_DBSTRING: tcp://container_monitoring:container_monitoring@clickhouse:9000/default
    volumes:
      - ./core/migrations/clickhouse:/migrations:ro
    depends_on:
      clickhouse:
        condition: service_healthy

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./core/deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./core/deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      clickhouse:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_GRAFANA_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      core:
        condition: service_started
      grafana:
        condition: service_started

  core:
    build:
      context: ./core
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: :8080
      KAFKA_BROKERS: kafka:29092
      KAFKA_METRICS_TOPIC: container.metrics
      KAFKA_EVENTS_TOPIC: container.events
      KAFKA_GROUP_ID: container-monitoring-core-local
      POSTGRES_DSN: postgres://container_monitoring:container_monitoring@postgres:5432/container_monitoring?sslmode=disable
      CLICKHOUSE_DSN: http://container_monitoring:container_monitoring@clickhouse:8123
      REDIS_ADDR: redis:6379
      RECOVERY_DOCKER_HOST: unix:///var/run/docker.sock
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      kafka:
        condition: service_healthy
      migrate-postgres:
        condition: service_completed_successfully
      migrate-clickhouse:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  agent:
    build:
      context: ./agent
    environment:
      AGENT_NODE_ID: local-node
      AGENT_COLLECTOR_BACKEND: docker
      DOCKER_HOST: unix:///var/run/docker.sock
      COLLECT_INTERVAL: 5s
      KAFKA_BROKERS: kafka:29092
      KAFKA_METRICS_TOPIC: container.metrics
      KAFKA_EVENTS_TOPIC: container.events
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      kafka:
        condition: service_healthy
      target-nginx:
        condition: service_started

  target-nginx:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    labels:
      container-monitoring.target: "true"

volumes:
  postgres-data:
  clickhouse-data:
  grafana-data:
